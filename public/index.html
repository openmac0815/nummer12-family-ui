<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nummer12</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Nummer12</h1>
          <p class="subline" id="week-label">Wochenansicht wird geladen...</p>
        </div>
        <div class="status-row">
          <div class="status-pill"><span class="dot" id="dot-ha"></span><span id="status-ha">HA</span></div>
          <div class="status-pill"><span class="dot" id="dot-ai"></span><span id="status-ai">Nummer12</span></div>
          <div class="status-pill"><span class="dot" id="dot-cal"></span><span id="status-cal">Kalender</span></div>
        </div>
      </header>

      <nav class="main-nav" id="main-nav"></nav>

      <main id="view-root"></main>
    </div>

    <template id="chat-template">
      <section class="panel chat-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Nummer12</p>
            <h3 class="chat-title">Chat</h3>
          </div>
        </div>
        <div class="chat-log"></div>
        <form class="chat-form">
          <textarea rows="1" placeholder="Mit Nummer12 sprechen..."></textarea>
          <button type="submit">Senden</button>
        </form>
      </section>
    </template>

    <template id="shopping-template">
      <section class="panel shopping-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Einkauf</p>
            <h3>Liste</h3>
          </div>
          <button class="ghost-button clear-done" type="button">Erledigte löschen</button>
        </div>
        <div class="shopping-list"></div>
        <form class="shopping-form">
          <input type="text" placeholder="Milch, Brot, Obst..." />
          <button type="submit">+</button>
        </form>
      </section>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
